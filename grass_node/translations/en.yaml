configuration:
  user_email:
    name: Grass account email
    description: >-
      The email of your getgrass.io account. Used for auto-login. Leave
      empty to log in entirely by hand through the noVNC web UI.
  user_password:
    name: Grass account password
    description: The password of your getgrass.io account (used for auto-login).
  try_autologin:
    name: Try auto-login
    description: >-
      Attempt an automatic login with the email/password above, following
      Grass's email -> "Use Password Instead" -> password flow. If it
      misfires, log in manually through the noVNC web UI; either way the
      session is saved to /data and persists.
  continue_tabs:
    name: Continue tab count
    description: >-
      Advanced. Tab presses from the email field to the CONTINUE button
      during auto-login. Default 1.
  password_link_tabs:
    name: Password link tab count
    description: >-
      Advanced. Number of Tab presses used during auto-login to reach the
      "Use Password Instead" link on the code screen. If auto-login lands on
      the wrong element, adjust this (watch the noVNC window) and restart.
      Default 7.
  signin_tabs:
    name: Sign-in tab count
    description: >-
      Advanced. Tab presses from the password field to the SIGN IN button
      during auto-login. Default 1.
  debug_screenshots:
    name: Debug screenshots
    description: >-
      Save a screenshot of each auto-login step to /data (grass-step*.png)
      so you can see exactly what the app showed when credentials were typed.
      Turn off once debugging is done.
  vnc_password:
    name: VNC password
    description: Password to access the noVNC / VNC interface. Default: money4band.
  vnc_resolution:
    name: VNC resolution
    description: Virtual screen resolution, for example 1280x720.
  allow_debug:
    name: Allow debug (deprecated)
    description: No longer used; safe to remove.
  headless:
    name: Headless mode (deprecated)
    description: No longer used; safe to remove.
  max_retry_multiplier:
    name: Max retry multiplier (deprecated)
    description: No longer used; safe to remove.
network:
  5900/tcp: VNC server port.
  6080/tcp: noVNC web interface port.
