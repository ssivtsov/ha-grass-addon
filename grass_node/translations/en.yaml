configuration:
  user_email:
    name: Grass account email
    description: The email address of your getgrass.io account.
  user_password:
    name: Grass account password
    description: The password of your getgrass.io account.
  allow_debug:
    name: Allow debug
    description: >-
      On login failure, capture a screenshot and browser log and upload
      them to a public image host for troubleshooting. Leave disabled
      unless you need it — the upload is publicly accessible.
  vnc_password:
    name: VNC password (deprecated)
    description: No longer used since 2.0.0; safe to remove.
  vnc_resolution:
    name: VNC resolution (deprecated)
    description: No longer used since 2.0.0; safe to remove.
  headless:
    name: Headless mode (deprecated)
    description: No longer used since 2.0.0; the node always runs headless.
  max_retry_multiplier:
    name: Max retry multiplier (deprecated)
    description: No longer used since 2.0.0; safe to remove.
network:
  80/tcp: Status page showing connection state, network quality and earnings.
