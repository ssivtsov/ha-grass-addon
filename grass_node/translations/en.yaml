configuration:
  user_email:
    name: Grass account email
    description: >-
      The email of your getgrass.io account. Used for auto-login. Leave
      empty to log in entirely by hand through the noVNC web UI.
  user_password:
    name: Grass account password
    description: The password of your getgrass.io account (used for auto-login).
  try_autologin:
    name: Try auto-login
    description: >-
      Attempt to log into the Grass desktop app automatically with the
      email/password above. If Grass shows a CAPTCHA or auto-login fails,
      open the noVNC web UI and log in manually — the session then persists.
  vnc_password:
    name: VNC password
    description: Password to access the noVNC / VNC interface. Default: money4band.
  vnc_resolution:
    name: VNC resolution
    description: Virtual screen resolution, for example 1280x720.
  allow_debug:
    name: Allow debug (deprecated)
    description: No longer used; safe to remove.
  headless:
    name: Headless mode (deprecated)
    description: No longer used; safe to remove.
  max_retry_multiplier:
    name: Max retry multiplier (deprecated)
    description: No longer used; safe to remove.
network:
  5900/tcp: VNC server port.
  6080/tcp: noVNC web interface port.
