name: "Grass Node"
description: "Run a Grass (getgrass.io) node to share unused bandwidth and earn points"
version: "2.1.1"
slug: "grass_node"
url: "https://github.com/ssivtsov/ha-grass-addon"
init: false
arch:
  - amd64
startup: application
boot: auto
ports:
  5900/tcp: 5900
  6080/tcp: 6080
ports_description:
  5900/tcp: "VNC (connect with a VNC client)"
  6080/tcp: "noVNC web interface (browser access / manual login)"
webui: "http://[HOST]:[PORT:6080]/vnc.html"
options:
  user_email: ""
  user_password: ""
  try_autologin: false
  vnc_password: "money4band"
  vnc_resolution: "1280x720"
schema:
  user_email: str?
  user_password: password?
  try_autologin: bool?
  vnc_password: password?
  vnc_resolution: str?
  # Deprecated options from earlier versions kept so existing configs
  # still validate; they are ignored by this image.
  allow_debug: bool?
  headless: bool?
  max_retry_multiplier: int(1,10)?
panel_icon: "mdi:grass"
panel_title: "Grass Node"
full_access: true
ingress: false
