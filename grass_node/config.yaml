name: "Grass Node"
description: "Run a Grass (getgrass.io) node to share unused bandwidth and earn points"
version: "2.0.0"
slug: "grass_node"
url: "https://github.com/ssivtsov/ha-grass-addon"
init: false
arch:
  - amd64
  - aarch64
startup: application
boot: auto
ports:
  80/tcp: 8080
ports_description:
  80/tcp: "Status page (connection state, network quality, earnings)"
webui: "http://[HOST]:[PORT:80]/"
options:
  user_email: ""
  user_password: ""
  allow_debug: false
schema:
  user_email: str
  user_password: password
  allow_debug: bool?
  # Deprecated options from 1.x kept so existing configs still validate;
  # they are ignored by the 2.x image.
  vnc_password: password?
  vnc_resolution: str?
  headless: bool?
  max_retry_multiplier: int(1,10)?
panel_icon: "mdi:grass"
panel_title: "Grass Node"
ingress: false
